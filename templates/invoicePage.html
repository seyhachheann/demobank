{% extends 'base.html' %}
{% block content %}
<div style="max-width: 500px; margin: 50px auto; border: 2px dashed #333; padding: 30px; font-family: monospace; background: #fff;">
    <h2 style="text-align: center;">BANK RECEIPT</h2>
    <hr>
    <p><strong>Transaction ID:</strong> {{ tx[0] }}</p>
    <p><strong>Type:</strong> {{ tx[2] }}</p>
    <p><strong>Account:</strong> {{ tx[4] }}</p>
    <p><strong>Amount:</strong> <span style="font-size: 1.5em; color: green;">${{ "{:,.2f}".format(tx[1]) }}</span></p>
    <p><strong>Date:</strong> {{ tx[3].strftime('%Y-%m-%d %H:%M') }}</p>
    <hr>
    <p style="text-align: center;">Thank you for banking with us!</p>
    
    <div style="text-align: center; margin-top: 20px;">
        <!-- <a href="{{ url_for('show_all_transactions') }}" style="background: #2ecc71; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px;">Back to History</a> -->
        <button onclick="window.print()" style="padding: 10px 20px; cursor: pointer;">Print Receipt</button>
    </div>
    <div style="display: flex; justify-content: center; padding:10px 0px;">
        <a href="/" style="text-align: center; text-decoration: none; font-size: 18px; color: red;">Back</a>
    </div>
</div>
{% endblock %}
